<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decklink ID Selector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            line-height: 1.6;
            background: #f4f6f9;
        }

        .control-panel {
            background: #ffffff;
            border: 1px solid #dee2e6;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            /* Smaller panel */
            margin: 0;
            /* Left aligned */
        }

        h3 {
            margin-top: 0;
        }

        select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 8px;
        }

        button:hover {
            opacity: 0.9;
        }

        #muteBtn {
            background-color: #007bff;
        }

        video {
            width: 420px;
            /* Smaller video */
            height: auto;
            margin-top: 20px;
            background: #000;
            display: none;
            border-radius: 6px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .video-container {
            margin-top: 15px;
        }

        .id-display {
            font-size: 0.8em;
            color: #666;
            word-break: break-all;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="control-panel">
        <h3>Video Input Selection, keep this open with muted and go back to main window dashboard</h3>
        <label for="videoSource">Choose Device:</label>
        <select id="videoSource"></select>
        <div id="selectedIdDisplay" class="id-display">ID: (Select a device)</div>
        <br>
        <!-- controls -->
        <button id="startBtn">Initialize Stream</button>
        <button id="muteBtn" style="margin-top:10px; background-color:#007bff;">
            Unmute Audio
        </button>
        <button id="recordBtn" style="background:#dc3545;">Start Recording</button>
        <!-- duration dropdown immediately left of continuous button -->
        <div style="display:inline-block; vertical-align:middle;">
            <select id="durationSelect" style="width:70px; padding:5px; font-size:0.9em;"></select>
        </div>
        <button id="continuousRecordBtn" style="background:#6f42c1; margin-top:10px; padding:5px 8px; font-size:0.9em; width:auto;">Start Continuous (min)</button>
    </div>

    <div style="text-align: center;">
        <video id="videoPlayer" playsinline autoplay muted></video>
    </div>

    <script>
        const videoSelect = document.getElementById('videoSource');
        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('videoPlayer');
        const idDisplay = document.getElementById('selectedIdDisplay');
        const muteBtn = document.getElementById('muteBtn');

        const recordBtn = document.getElementById('recordBtn');
        const durationSelect = document.getElementById('durationSelect');
        // store duration as seconds and a human-friendly label
        let selectedDurationSeconds = 60; // default 1 minute
        let selectedDurationLabel = '1 min';

let mediaRecorder;
let recordedChunks = [];
let continuousMediaRecorder = null;
let isContinuousRecording = false;

const continuousRecordBtn = document.getElementById('continuousRecordBtn');

continuousRecordBtn.addEventListener("click", () => {
    if (!window.stream) {
        alert("Start the stream first");
        return;
    }

    if (!isContinuousRecording) {
        // START continuous recording
        isContinuousRecording = true;
        continuousRecordBtn.innerText = `Stop Continuous (${selectedDurationLabel})`;
        continuousRecordBtn.style.backgroundColor = "#6c757d";
        recordNextSegment();
    } else {
        // STOP continuous recording
        isContinuousRecording = false;
        if (continuousMediaRecorder && continuousMediaRecorder.state === "recording") {
            continuousMediaRecorder.stop();
        }
        continuousRecordBtn.innerText = `Start Continuous (${selectedDurationLabel})`;
        continuousRecordBtn.style.backgroundColor = "#6f42c1";
    }
});

function recordNextSegment() {
    if (!isContinuousRecording || !window.stream) return;

    let continuousChunks = [];
    let mimeType = "video/webm;codecs=vp9,opus";
    if (!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = "video/webm";
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = "video/mp4";
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = "";
            }
        }
    }

    continuousMediaRecorder = new MediaRecorder(window.stream, { mimeType });

    continuousMediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
            continuousChunks.push(event.data);
        }
    };

    continuousMediaRecorder.onstop = () => {
        const blob = new Blob(continuousChunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, -5);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${timestamp}.webm`;
        a.click();
        URL.revokeObjectURL(url);

        // automatically start next segment if still recording
        if (isContinuousRecording) {
            recordNextSegment();
        }
    };

    continuousMediaRecorder.start();
    
    // stop after selected duration
    setTimeout(() => {
        if (continuousMediaRecorder && continuousMediaRecorder.state === "recording") {
            continuousMediaRecorder.stop();
        }
    }, selectedDurationSeconds * 1000);
}

recordBtn.addEventListener("click", () => {

    if (!window.stream) {
        alert("Start the stream first");
        return;
    }

    // If recorder not started → START
    if (!mediaRecorder || mediaRecorder.state === "inactive") {

        recordedChunks = [];

        // Detect supported mime type with fallback
        let mimeType = "video/webm;codecs=vp9,opus";
        if (!MediaRecorder.isTypeSupported(mimeType)) {
            mimeType = "video/webm";
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = "video/mp4";
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = ""; // Let browser choose
                }
            }
        }

        mediaRecorder = new MediaRecorder(window.stream, { mimeType });

        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) {
                recordedChunks.push(event.data);
            }
        };

        mediaRecorder.onstop = () => {

            const blob = new Blob(recordedChunks, { type: mimeType });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "decklink_recording.webm";
            a.click();

            URL.revokeObjectURL(url);
        };

        mediaRecorder.start();

        recordBtn.innerText = "Stop Recording";
        recordBtn.style.backgroundColor = "#6c757d";

    } else {

        // STOP recording
        mediaRecorder.stop();

        recordBtn.innerText = "Start Recording";
        recordBtn.style.backgroundColor = "#dc3545";
    }

});
        muteBtn.addEventListener('click', () => {
            if (!video.srcObject) return; // No stream yet

            video.muted = !video.muted;

            if (video.muted) {
                muteBtn.innerText = "Unmute Audio";
                muteBtn.style.backgroundColor = "#007bff";
            } else {
                muteBtn.innerText = "Mute Audio";
                muteBtn.style.backgroundColor = "#dc3545";
            }
        });

        /**
         * 1. Populate the Combo Box with Names and IDs
         */
        async function loadDevices() {
            try {
                // Trigger a temporary prompt to get permissions so labels aren't blank
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop()); // Stop temp stream immediately

                const devices = await navigator.mediaDevices.enumerateDevices();

                videoSelect.innerHTML = '';

                devices.forEach(device => {
                    if (device.kind === 'videoinput') {
                        const option = document.createElement('option');
                        option.value = device.deviceId; // This is the ID we need
                        option.text = device.label || `Unknown Device (${device.deviceId.substring(0, 5)}...)`;
                        videoSelect.appendChild(option);
                    }
                });

                // Update ID display when user changes selection
                videoSelect.onchange = () => {
                    idDisplay.innerText = "Target ID: " + videoSelect.value;
                };

                // populate duration dropdown: 10 sec plus 1 through 60 minutes
                durationSelect.innerHTML = '';
                // ten seconds option
                let opt = document.createElement('option');
                opt.value = 10; // seconds
                opt.text = '10 sec';
                if (selectedDurationSeconds === 10) opt.selected = true;
                durationSelect.appendChild(opt);

                for (let i = 1; i <= 60; i++) {
                    opt = document.createElement('option');
                    opt.value = i * 60; // seconds
                    opt.text = `${i} min`;
                    if (selectedDurationSeconds === i * 60) opt.selected = true;
                    durationSelect.appendChild(opt);
                }

                durationSelect.onchange = () => {
                    selectedDurationSeconds = parseInt(durationSelect.value, 10);
                    // compute human label
                    if (selectedDurationSeconds === 10) {
                        selectedDurationLabel = '10 sec';
                    } else {
                        selectedDurationLabel = `${selectedDurationSeconds / 60} min`;
                    }
                    // update button text
                    continuousRecordBtn.innerText = isContinuousRecording ?
                        `Stop Continuous (${selectedDurationLabel})` :
                        `Start Continuous (${selectedDurationLabel})`;
                };

                // Trigger initial display
                if (videoSelect.options.length > 0) videoSelect.onchange();


            } catch (err) {
                console.error("Initialization error:", err);
                alert("Could not list devices. Ensure you are on HTTPS and have granted permissions.");
            }
        }

        /**
         * 2. Start the video using the specific selected ID
         */
        async function startStream() {
            const targetId = videoSelect.value; // The selected ID from the combo box

            if (!targetId) {
                alert("Please select a device first.");
                return;
            }

            // Stop existing stream if it exists to free up the hardware
            if (window.stream) {
                window.stream.getTracks().forEach(track => track.stop());
            }

            // Strict constraints for Decklink
            const constraints = { audio: { sampleRate: 48000, channelCount: 2, echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: { deviceId: { exact: targetId } } };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                video.srcObject = stream;

                video.style.display = "block";
                video.onloadedmetadata = () => video.play();
                video.playbackRate = 1.0;

                console.log("Stream started with ID:", targetId);

                const vTrack = stream.getVideoTracks()[0];
                const aTrack = stream.getAudioTracks()[0];

                console.log("Video:", vTrack.getSettings());
                console.log("Audio:", aTrack.getSettings());
            } catch (error) {
                console.error("Stream Error:", error);
                // Try fallback constraints with lower resolution
                try {
                    const fallbackConstraints = {
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
                        video: { deviceId: { exact: targetId }, width: 1280, height: 720, frameRate: { ideal: 30 } }
                    };
                    const fallbackStream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    window.stream = fallbackStream;
                    video.srcObject = fallbackStream;
                    video.style.display = "block";
                    video.onloadedmetadata = () => video.play();
                    console.log("Stream started with fallback constraints");
                } catch (fallbackError) {
                    console.error("Stream Error:", error);
                    alert("Error: " + error.name + "\nTried fallback constraints but still failed.");
                }
            }
        }

        // Initial Load
        loadDevices();

        // Event Listener
        startBtn.addEventListener('click', startStream);
    </script>

</body>

</html>
